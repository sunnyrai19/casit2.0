<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASIT | Financial Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&family=Oxanium:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="wallet-style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-wrapper">
            <div class="logo">
                <div class="logo-box">C</div>
                <span class="logo-text">CASIT</span>
            </div>

            <div class="nav-icons-group">
                    <a href="index.html" class="nav-icon-btn active-nav">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </a>

                    <a href="store.html" class="nav-icon-btn active-nav">                    
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    </a>

                    <a href="wallet.html" class="nav-icon-btn active-nav">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </a>
                </div>
        </div>
    </nav>
    <main class="container">
        <div class="breadcrumb">SECURE_NETWORK > WALLET_V1.04</div>

        <section class="wallet-intro">
            <div class="cyber-box">
                <h2 class="responsive-header">CASIT INTERFACE 2.0</h2>
                <p class="responsive-text">
                    SECURE TRANSCTION WITH CASIT .
                </p>
            </div>
        </section>

        <section class="calculator-section">
            <div class="cyber-box calc-container">
                <h3 class="calc-title">TRANSACTION_FEE_CALCULATOR</h3>
                
                <div id="error-msg" class="error-text"></div>

                <div class="input-wrapper">
                    <span class="currency-label">RS.</span>
                    <input type="number" id="amountInput" placeholder="ENTER_AMOUNT..." oninput="clearError()">
                </div>

                <button class="calc-btn" onclick="calculateTax()">INITIATE_CALCULATION</button>

                <div id="result-box" class="result-display" style="display: none;">
                    <div class="res-row"><span>BASE_AMOUNT:</span> <span id="res-base">0</span></div>
                    <div class="res-row pink-text"><span>SYSTEM_TAX (+7/100):</span> <span id="res-tax">0</span></div>
                    <div class="res-divider"></div>
                    <div class="res-row final-row"><span>TOTAL_CREDITS:</span> <span id="res-total">0</span></div>
                </div>
            </div>
        </section>
        <section class="action-section">
            <div class="action-grid">
                <button class="action-card">
                    <div class="action-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10M7 17L17 7"/></svg>
                    </div>
                    <div class="action-info">
                        <span class="action-label">PAYMENT_GATEWAY</span>
                        <span class="action-value">UPI_TRANSFER</span>
                    </div>
                </button>

                <button class="action-card moderator-border">
                    <div class="action-icon moderator-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    </div>
                    <div class="action-info">
                        <span class="action-label">SUPPORT_LEVEL</span>
                        <span class="action-value moderator-text"><a href="members.html">MODERATOR</a></span>
                    </div>
                </button>
            </div>
        </section>
    </main>

    <script>
        function clearError() {
            document.getElementById('error-msg').innerText = "";
            document.getElementById('result-box').style.display = "none";
        }

        function calculateTax() {
            const input = document.getElementById('amountInput').value;
            const amount = parseFloat(input);
            const errorDiv = document.getElementById('error-msg');
            const resultBox = document.getElementById('result-box');

            // Validation: 10 to 50,000
            if (isNaN(amount) || amount < 10 || amount > 50000) {
                errorDiv.innerText = ">> NOT VALID [MIN 10 - MAX 50,000]";
                resultBox.style.display = "none";
                return;
            }

            // Logic: +7 RS for every 100 RS block
            // Examples: 1-100 = 7, 101-200 = 14, 201-300 = 21
            const tax = Math.ceil(amount / 100) * 7;
            const total = amount + tax;

            // UI Update
            document.getElementById('res-base').innerText = amount.toLocaleString() + " RS";
            document.getElementById('res-tax').innerText = tax.toLocaleString() + " RS";
            document.getElementById('res-total').innerText = total.toLocaleString() + " RS";
            
            errorDiv.innerText = "";
            resultBox.style.display = "block";
        }
    </script>
</body>
</html>
